version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finvestia-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finvestia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finvestia"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finvestia-api
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/finvestia?schema=public"
      JWT_SECRET: "super-secret-key-12345-portfolio-tracker"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finvestia-web
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
